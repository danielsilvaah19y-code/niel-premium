name: Criar APK NIEL IPTV
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Ferramentas
        run: |
          sudo apt update
          sudo apt install -y python3-pip build-essential git libncurses5 libncurses5-dev libncursesw5-dev libzip-dev zlib1g-dev libffi-dev libssl-dev openjdk-17-jdk autoconf automake libtool pkg-config cmake
          pip install --upgrade pip
          pip install "cython<3.0.0" buildozer kivymd

      - name: Aceitar Licencas Android (O SEGREDO)
        run: |
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          # Este comando aceita todas as licenças do SDK antes de começar o Buildozer
          yes | sdkmanager --licenses || true

      - name: Criar APK NIEL PREMIUM
        run: |
          rm -f buildozer.spec
          buildozer init
          
          # Configurações do App
          sed -i 's/package.name = myapp/package.name = nieliptv/' buildozer.spec
          sed -i 's/title = My Application/title = NIEL IPTV PREMIUM/' buildozer.spec
          sed -i 's/# android.permissions = INTERNET/android.permissions = INTERNET,ACCESS_NETWORK_STATE/' buildozer.spec
          sed -i 's/android.api = 31/android.api = 30/' buildozer.spec
          
          # Força o aceite no arquivo spec também
          sed -i 's/# android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
          
          # Requisitos
          sed -i 's/requirements = python3,kivy/requirements = python3,kivy==2.2.1,kivymd,jnius,pillow,requests/' buildozer.spec
          
          export APP_ALLOW_ROOT=1
          # O "yes |" aqui serve como reforço
          yes | buildozer -v android debug

      - name: Disponibilizar APK
        uses: actions/upload-artifact@v4
        with:
          name: NIEL-IPTV-APK
          path: bin/*.apk
